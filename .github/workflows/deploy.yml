name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Secrets (masked)
        run: |
          echo "Host length: $(echo -n '${{ secrets.SERVER_HOST }}' | wc -c)"
          echo "User length: $(echo -n '${{ secrets.SERVER_USER }}' | wc -c)"
          echo "Key length: $(echo -n '${{ secrets.SERVER_SSH_KEY }}' | wc -c)"
          echo "Key starts with: $(echo '${{ secrets.SERVER_SSH_KEY }}' | head -c 30)"

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.SERVER_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key || echo "Invalid key format"

      - name: Test SSH Connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "echo SSH_OK" || echo "SSH_FAILED"
