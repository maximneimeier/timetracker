name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test SSH Connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "=== SSH Connected ==="
            whoami
            pwd
            docker ps 2>&1 || echo "Docker check failed"
            ls -la /home/jarvis-helper/timetracker 2>&1 || echo "Repo check failed"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/jarvis-helper/timetracker
            git pull origin main
            docker compose -f docker-compose.yml up -d --build || docker-compose -f docker-compose.yml up -d --build || echo "Docker compose failed"
            docker ps | grep timetracker || echo "Container not running"
